services:
  - type: web
    name: smarttt-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: smarttt-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://smart-timetable-8f116.web.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://smarttt-backend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: smarttt-db
          property: connectionString

databases:
  - name: smarttt-db
    plan: free
